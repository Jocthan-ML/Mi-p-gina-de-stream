<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoto[G.M] | Hub Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --fondo: #050505;
            --morado-vivo: #bc13fe;
            --verde-neon: #39FF14; /* El verde de Kick */
            --cristal: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--fondo);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(57, 255, 20, 0.1) 0%, transparent 40%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: var(--cristal);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .logo-img {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px var(--morado-vivo));
        }

        .descripcion {
            font-family: 'Orbitron', sans-serif;
            color: var(--verde-neon);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* --- ESTE ES EL BOTÓN DE KICK IGUAL A LA IMAGEN --- */
        .btn-kick {
            display: block;
            background-color: #000; /* Fondo negro como la imagen */
            color: var(--verde-neon); /* Letras verdes */
            text-decoration: none;
            font-family: 'Press Start 2P', cursive; /* Fuente de píxeles */
            font-size: 1.2rem;
            padding: 20px;
            margin: 15px 0;
            /* Borde cuadrado y pixelado */
            border: 4px solid var(--verde-neon);
            box-shadow: 0 0 15px var(--verde-neon);
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-kick:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--verde-neon);
            background-color: #080808;
        }

        /* Botones normales para el resto */
        .boton {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            padding: 16px;
            background: linear-gradient(45deg, rgba(188, 19, 254, 0.1), transparent);
            color: white;
            text-decoration: none;
            border: 1px solid rgba(188, 19, 254, 0.5);
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .boton:hover {
            border-color: var(--verde-neon);
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://raw.githubusercontent.com/Jocthan-ML/Mi-p-gina-de-stream/main/Yoto%20Logo.png" alt="Yoto GM Logo" class="logo-img">
        
        <div class="descripcion">Streamer Gamer / Content Creator</div>
        
        <a href="https://kick.com/jocthanM" target="_blank" class="btn-kick">
            KICK
        </a>

        <a href="https://www.facebook.com/profile.php?id=100092795311838" target="_blank" class="boton">
            <i class="fa-brands fa-facebook"></i> FACEBOOK
        </a>

        <a href="https://www.tiktok.com/@yoto.gm" target="_blank" class="boton">
            <i class="fa-brands fa-tiktok"></i> TIKTOK
        </a>
    </div>

</body>
</html>
